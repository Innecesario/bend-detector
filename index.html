<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Detector</title>
<style>
/* ============================================================
   BEND DETECTOR — Analizador de bends para guitarra
   Estética: panel de rack / medidor de afinación analógico.
   Firma visual: el VU-meter de cents como elemento central,
   con una aguja que recorre un arco como un afinador de pedal.
   ============================================================ */
:root {
  --bg:        #141210;
  --surface:   #1E1B18;
  --surface2:  #252220;
  --border:    #332E28;
  --border2:   #423C34;
  --copper:    #C9762C;
  --copper-b:  #E89348;
  --copper-d:  #8A5420;
  --green:     #4CAF50;
  --green-d:   #2E7D32;
  --red:       #E24B4A;
  --yellow:    #F0C040;
  --text:      #EDE6D6;
  --text-2:    #A89A7C;
  --text-3:    #6B6354;
  --font-disp: 'Courier New', monospace;
  --font-body: system-ui, -apple-system, sans-serif;
  --r:         10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(10px, 3vw, 20px);
  gap: clamp(10px, 2.5vh, 16px);
  padding-bottom: 20px;
}

/* ---- Header ---- */
.app-header {
  width: 100%;
  text-align: center;
  padding-top: 6px;
}
.app-title {
  font-family: var(--font-disp);
  font-size: clamp(1rem, 5vw, 1.3rem);
  font-weight: bold;
  letter-spacing: 0.25em;
  color: var(--copper);
  text-transform: uppercase;
}
.app-sub {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--text-3);
  margin-top: 3px;
  text-transform: uppercase;
}

/* ---- Section card ---- */
.card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: clamp(12px, 3vw, 18px);
}
.card-label {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ---- String selector ---- */
.string-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.str-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  gap: 2px;
  transition: border-color 0.12s, background 0.12s;
}
.str-btn .str-num {
  font-size: 0.6rem;
  color: var(--text-3);
  letter-spacing: 0.05em;
}
.str-btn .str-name {
  font-family: var(--font-disp);
  font-size: clamp(1rem, 4vw, 1.2rem);
  font-weight: bold;
  color: var(--text-2);
  line-height: 1;
}
.str-btn .str-hz {
  font-size: 0.55rem;
  color: var(--text-3);
}
.str-btn.active {
  border-color: var(--copper);
  background: rgba(201,118,44,0.12);
}
.str-btn.active .str-name { color: var(--copper-b); }

/* ---- Fret selector ---- */
.fret-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 14px;
}
.fret-label {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  white-space: nowrap;
}
.fret-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}
.fret-btn {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-2);
  font-size: 1.3rem;
  font-weight: bold;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.12s, background 0.12s, color 0.12s;
}
.fret-btn:active { background: var(--border); color: var(--text); }
.fret-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 72px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px 6px;
  gap: 2px;
}
.fret-number {
  font-family: var(--font-disp);
  font-size: clamp(1.8rem, 8vw, 2.2rem);
  font-weight: bold;
  color: var(--copper-b);
  line-height: 1;
  letter-spacing: 0.05em;
}
.fret-note {
  font-family: var(--font-disp);
  font-size: 0.72rem;
  color: var(--text-3);
  letter-spacing: 0.12em;
  line-height: 1;
}

/* ---- Bend interval selector ---- */
.bend-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.bend-btn {
  padding: 12px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-2);
  font-size: clamp(0.85rem, 3.5vw, 1rem);
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  transition: border-color 0.12s, background 0.12s, color 0.12s;
  line-height: 1.3;
}
.bend-btn .bend-sub {
  display: block;
  font-size: 0.6rem;
  color: var(--text-3);
  font-weight: 400;
  margin-top: 2px;
}
.bend-btn.active {
  border-color: var(--copper);
  background: rgba(201,118,44,0.12);
  color: var(--copper-b);
}
.bend-btn.active .bend-sub { color: var(--copper-d); }

/* ---- Target display — shows origin → destination ---- */
.target-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 0 10px;
}
.target-note {
  font-family: var(--font-disp);
  font-size: clamp(1.8rem, 8vw, 2.4rem);
  font-weight: bold;
  line-height: 1;
}
.target-note.origin { color: var(--text-2); }
.target-note.dest   { color: var(--copper-b); }
.target-arrow {
  font-size: clamp(1.2rem, 5vw, 1.6rem);
  color: var(--text-3);
}
.target-sub {
  font-size: 0.7rem;
  color: var(--text-3);
  text-align: center;
  letter-spacing: 0.06em;
}

/* ---- Pitch readout ---- */
.pitch-big {
  font-family: var(--font-disp);
  font-size: clamp(3.5rem, 16vw, 5rem);
  font-weight: bold;
  line-height: 1;
  text-align: center;
  color: var(--text-2);
  transition: color 0.1s;
  min-height: 1.1em;
  letter-spacing: 0.04em;
}
.pitch-big.green  { color: var(--green); }
.pitch-big.yellow { color: var(--yellow); }
.pitch-big.red    { color: var(--red); }
.pitch-hz {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-3);
  font-family: var(--font-disp);
  margin-top: 2px;
}

/* ---- Cents bar ---- */
.cents-wrap {
  margin-top: 12px;
}
.cents-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cents-val-label {
  font-family: var(--font-disp);
  font-size: clamp(1rem, 4.5vw, 1.2rem);
  font-weight: bold;
  min-width: 60px;
  text-align: right;
  color: var(--text-2);
}
.cents-val-label.green  { color: var(--green); }
.cents-val-label.yellow { color: var(--yellow); }
.cents-val-label.red    { color: var(--red); }
.bar-track {
  position: relative;
  flex: 1;
  height: 38px;
  background: var(--bg);
  border-radius: 19px;
  border: 1px solid var(--border);
  overflow: hidden;
}
/* Green zone ±15¢ */
.bar-track::before {
  content: '';
  position: absolute;
  left: calc(50% - 15%);
  width: 30%;
  top: 0; bottom: 0;
  background: rgba(76,175,80,0.15);
}
.bar-track::after {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 1px;
  background: var(--border2);
}
.bar-needle {
  position: absolute;
  top: 5px; bottom: 5px;
  width: 8px;
  border-radius: 4px;
  background: var(--copper);
  transform: translateX(-50%);
  left: 50%;
  transition: left 0.06s linear, background 0.1s;
}
.bar-needle.green  { background: var(--green); box-shadow: 0 0 10px var(--green); }
.bar-needle.yellow { background: var(--yellow); }
.bar-needle.red    { background: var(--red); }
.cents-ticks {
  display: flex;
  justify-content: space-between;
  font-size: 0.58rem;
  color: var(--text-3);
  font-family: var(--font-disp);
  margin-top: 4px;
  padding: 0 2px;
}
.zone-label {
  text-align: center;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  margin-top: 6px;
  min-height: 1.2em;
}
.zone-label.green  { color: var(--green); }
.zone-label.yellow { color: var(--yellow); }
.zone-label.red    { color: var(--red); }
.zone-label.silent { color: var(--text-3); }

/* ---- Hold timer ---- */
.timer-wrap {
  margin-top: 10px;
}
.timer-label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
}
.timer-label {
  font-size: 0.65rem;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.timer-count {
  font-family: var(--font-disp);
  font-size: 0.9rem;
  color: var(--green);
}
.timer-track {
  height: 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--green-d), var(--green));
  border-radius: 7px;
  transition: width 0.08s linear, background 0.2s;
}

/* ---- Scrolling graph ---- */
.graph-wrap {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-top: 10px;
  position: relative;
}
.graph-wrap canvas { display: block; width: 100%; }
.graph-badge {
  position: absolute;
  top: 6px; right: 8px;
  font-size: 0.58rem;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ---- Session stats ---- */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.stat-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 6px 8px;
  text-align: center;
}
.stat-val {
  font-family: var(--font-disp);
  font-size: clamp(1.2rem, 5vw, 1.5rem);
  font-weight: bold;
  color: var(--copper-b);
  line-height: 1;
}
.stat-lbl {
  font-size: 0.6rem;
  color: var(--text-3);
  letter-spacing: 0.06em;
  margin-top: 4px;
  text-transform: uppercase;
  line-height: 1.3;
}
.stat-sub {
  font-size: 0.58rem;
  color: var(--text-3);
  margin-top: 2px;
}
.btn-reset {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-3);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.btn-reset:active { background: var(--border); }

/* ---- Mic toggle button ---- */
.btn-mic {
  width: 100%;
  padding: clamp(14px, 3.5vh, 18px);
  background: linear-gradient(180deg, var(--copper-b), var(--copper));
  color: #141210;
  font-size: clamp(0.9rem, 4vw, 1rem);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  box-shadow: 0 2px 0 var(--copper-d), 0 1px 0 rgba(255,255,255,0.2) inset;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background 0.15s;
}
.btn-mic.active {
  background: linear-gradient(180deg, #5a9e5c, #3d7a3f);
  box-shadow: 0 2px 0 #2a5c2c, 0 1px 0 rgba(255,255,255,0.15) inset;
  color: #fff;
}
.btn-mic:active { transform: translateY(1px); box-shadow: none; }
.mic-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  flex-shrink: 0;
}
.btn-mic.active .mic-dot {
  background: #fff;
  box-shadow: 0 0 6px #fff;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* ---- Status bar ---- */
.status-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text-3);
  padding: 0 2px;
}
.status-bar .wl-ok  { color: var(--green); }
.status-bar .wl-bad { color: var(--red); }

/* ---- Flash overlay for successful bend ---- */
.flash {
  position: fixed;
  inset: 0;
  background: rgba(76,175,80,0.25);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  border-radius: 0;
  z-index: 100;
}
.flash.show { opacity: 1; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- Header -->
<div class="app-header">
  <div class="app-title">Bend Detector</div>
  <div class="app-sub">Control de afinación · Guitarra</div>
</div>

<!-- Setup card: string + fret + bend interval -->
<div class="card">
  <div class="card-label">Configuración</div>

  <!-- String selector -->
  <div class="string-grid" id="stringGrid">
    <!-- filled by JS -->
  </div>

  <!-- Fret selector -->
  <div class="fret-row">
    <span class="fret-label">Traste</span>
    <div class="fret-controls">
      <button class="fret-btn" id="fretDown">−</button>
      <div class="fret-display">
        <span class="fret-number" id="fretDisplay">7</span>
        <span class="fret-note" id="fretNote">D4</span>
      </div>
      <button class="fret-btn" id="fretUp">+</button>
    </div>
  </div>

  <!-- Bend interval -->
  <div style="margin-top:14px">
    <div class="card-label">Intervalo del bend</div>
    <div class="bend-grid">
      <button class="bend-btn" data-semi="1">
        ½ tono
        <span class="bend-sub">1 traste</span>
      </button>
      <button class="bend-btn active" data-semi="2">
        1 tono
        <span class="bend-sub">2 trastes</span>
      </button>
      <button class="bend-btn" data-semi="3">
        1½ tonos
        <span class="bend-sub">3 trastes</span>
      </button>
    </div>
  </div>
</div>

<!-- Live pitch card -->
<div class="card">
  <!-- Target: origin → destination -->
  <div class="target-display">
    <div class="target-note origin" id="originNote">B3</div>
    <div class="target-arrow">→</div>
    <div class="target-note dest" id="destNote">C#4</div>
  </div>
  <div class="target-sub" id="targetSub">Toca el traste 7 (G) y dobla 1 tono hasta C#4</div>

  <!-- Big pitch readout -->
  <div class="pitch-big" id="pitchBig">--</div>
  <div class="pitch-hz" id="pitchHz">--- Hz · claridad: ---%</div>

  <!-- Cents bar -->
  <div class="cents-wrap">
    <div class="cents-bar-row">
      <div class="cents-val-label" id="centsLabel">-- ¢</div>
      <div class="bar-track">
        <div class="bar-needle" id="barNeedle"></div>
      </div>
    </div>
    <div class="cents-ticks">
      <span>−50</span><span>−25</span><span>0</span><span>+25</span><span>+50</span>
    </div>
    <div class="zone-label silent" id="zoneLabel">—</div>
  </div>

  <!-- Hold timer -->
  <div class="timer-wrap">
    <div class="timer-label-row">
      <span class="timer-label">Mantener afinado (1 s)</span>
      <span class="timer-count" id="timerCount">0 / 0</span>
    </div>
    <div class="timer-track">
      <div class="timer-fill" id="timerFill"></div>
    </div>
  </div>

  <!-- Scrolling graph -->
  <div class="graph-wrap">
    <canvas id="graph" height="140"></canvas>
    <span class="graph-badge">últimos 4 s</span>
  </div>
</div>

<!-- Session stats -->
<div class="card">
  <div class="card-label">Sesión</div>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-val" id="statAttempts">0</div>
      <div class="stat-lbl">Intentos</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statHits">0</div>
      <div class="stat-lbl">Conseguidos</div>
      <div class="stat-sub" id="statPct">--%</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statAvgCents">--</div>
      <div class="stat-lbl">Desviación<br>media (¢)</div>
    </div>
  </div>
  <button class="btn-reset" id="btnReset">Reiniciar sesión</button>
</div>

<!-- Mic button -->
<button class="btn-mic" id="btnMic">
  <span class="mic-dot" id="micDot"></span>
  Iniciar micrófono
</button>

<!-- Status bar -->
<div class="status-bar">
  <span id="statusLeft">—</span>
  <span id="wlStatus">—</span>
</div>

<script>
'use strict';

// ============================================================
// PITCH DETECTION — McLeod Pitch Method (MPM)
// ============================================================
const BUFFER_SIZE    = 2048;
const CLARITY_THRESH = 0.85;
const SMOOTH_FRAMES  = 4;
const CENTS_GREEN    = 15;   // ±cents para "afinado"
const CENTS_CLOSE    = 35;   // ±cents para "cerca"
const HOLD_MS        = 120;  // ms a mantener última nota válida
const GOAL_MS        = 1000; // ms a mantener en zona verde para "conseguido"

function findPitch(buffer, sampleRate) {
  const n = buffer.length;
  const nsdf = new Float32Array(n);
  let acf0 = 0;
  for (let i = 0; i < n; i++) acf0 += buffer[i] * buffer[i];
  acf0 *= 2;
  for (let tau = 0; tau < n; tau++) {
    let acf = 0, sdf = 0;
    for (let j = 0; j < n - tau; j++) {
      acf += buffer[j] * buffer[j + tau];
      sdf += buffer[j] * buffer[j] + buffer[j + tau] * buffer[j + tau];
    }
    nsdf[tau] = sdf > 0 ? 2 * acf / sdf : 0;
  }
  const keyMaxima = [];
  let searchStart = 0;
  while (searchStart < n && nsdf[searchStart] > 0) searchStart++;
  while (searchStart < n && nsdf[searchStart] <= 0) searchStart++;
  let maxVal = -Infinity, maxPos = -1;
  for (let i = searchStart; i < n - 1; i++) {
    if (nsdf[i] > nsdf[i - 1] && nsdf[i] >= nsdf[i + 1]) {
      if (nsdf[i] > maxVal) { maxVal = nsdf[i]; maxPos = i; }
    }
    if (nsdf[i] < 0 && maxPos >= 0) {
      keyMaxima.push({ pos: maxPos, val: maxVal });
      maxVal = -Infinity; maxPos = -1;
    }
  }
  if (keyMaxima.length === 0) return { freq: 0, clarity: 0 };
  const globalMax = Math.max(...keyMaxima.map(k => k.val));
  const chosen = keyMaxima.find(k => k.val >= 0.8 * globalMax);
  if (!chosen) return { freq: 0, clarity: 0 };
  const tau = chosen.pos;
  let refined = tau;
  if (tau > 0 && tau < n - 1) {
    const s0 = nsdf[tau-1], s1 = nsdf[tau], s2 = nsdf[tau+1];
    const d = 2*s1 - s0 - s2;
    if (d !== 0) refined = tau + (s2 - s0) / (2 * d);
  }
  return { freq: refined > 0 ? sampleRate / refined : 0, clarity: chosen.val };
}

// ============================================================
// MUSIC THEORY HELPERS
// ============================================================

// Standard tuning open string frequencies (Hz)
const STRINGS = [
  { num: 6, name: 'E', freq: 82.41,  label: 'Mi' },
  { num: 5, name: 'A', freq: 110.00, label: 'La' },
  { num: 4, name: 'D', freq: 146.83, label: 'Re' },
  { num: 3, name: 'G', freq: 196.00, label: 'Sol' },
  { num: 2, name: 'B', freq: 246.94, label: 'Si' },
  { num: 1, name: 'e', freq: 329.63, label: 'Mi' },
];

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqAtFret(stringFreq, fret) {
  return stringFreq * Math.pow(2, fret / 12);
}

function freqToMidi(freq) {
  return 69 + 12 * Math.log2(freq / 440);
}

function midiToNoteName(midi) {
  const rounded = Math.round(midi);
  const note = NOTE_NAMES[((rounded % 12) + 12) % 12];
  const octave = Math.floor(rounded / 12) - 1;
  return `${note}${octave}`;
}

function freqToCents(detectedFreq, targetFreq) {
  if (detectedFreq <= 0 || targetFreq <= 0) return null;
  return 1200 * Math.log2(detectedFreq / targetFreq);
}

function centsColor(cents) {
  if (cents === null) return 'silent';
  const abs = Math.abs(cents);
  if (abs <= CENTS_GREEN) return 'green';
  if (abs <= CENTS_CLOSE) return 'yellow';
  return 'red';
}

// ============================================================
// APP STATE
// ============================================================
let selectedString = 3;  // index into STRINGS (0=6th, 5=1st), default 3rd (G)
let selectedFret   = 7;
let selectedSemi   = 2;  // semitones of bend

// Derived
let originFreq  = 0;
let targetFreq  = 0;
let originName  = '';
let targetName  = '';

function updateTargetState() {
  const str = STRINGS[selectedString];
  originFreq = freqAtFret(str.freq, selectedFret);
  targetFreq = freqAtFret(str.freq, selectedFret + selectedSemi);
  originName = midiToNoteName(freqToMidi(originFreq));
  targetName = midiToNoteName(freqToMidi(targetFreq));
}

// Audio
let audioCtx = null, analyser = null, source = null, rafId = null;
let wakeLock = null;
let micActive = false;
let smoothBuf = [];
let lastValidFreq = 0, lastValidClarity = 0, lastValidTime = 0;

// Timer state
let inGreenZone   = false;
let greenStart    = 0;   // performance.now() when entered green zone
let currentHoldMs = 0;

// Session stats
let statAttempts  = 0;
let statHits      = 0;
let centsSamples  = [];  // array of |cents| while in green zone
let bendDetected  = false; // true once pitch goes above origin (bend started)

// Graph
const graphData = [];
const GRAPH_MAX = 4 * 25; // 4s at ~25fps

// ============================================================
// UI BUILD
// ============================================================
function buildStringGrid() {
  const grid = document.getElementById('stringGrid');
  grid.innerHTML = '';
  STRINGS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'str-btn' + (i === selectedString ? ' active' : '');
    btn.innerHTML = `
      <span class="str-num">${s.num}ª</span>
      <span class="str-name">${s.name}</span>
      <span class="str-hz">${s.label}</span>
    `;
    btn.addEventListener('click', () => {
      selectedString = i;
      buildStringGrid();
      updateConfig();
    });
    grid.appendChild(btn);
  });
}

function updateConfig() {
  updateTargetState();

  // Fret display
  document.getElementById('fretDisplay').textContent = selectedFret;
  document.getElementById('fretNote').textContent = originName;

  // Target display
  document.getElementById('originNote').textContent = originName;
  document.getElementById('destNote').textContent   = targetName;

  const str = STRINGS[selectedString];
  const bendLabels = { 1: '½ tono', 2: '1 tono', 3: '1½ tonos' };
  document.getElementById('targetSub').textContent =
    `Toca traste ${selectedFret} cuerda ${str.num}ª (${str.name}) · bend ${bendLabels[selectedSemi]} → ${targetName}`;

  // Reset timer on config change
  resetTimer();
}

function updateStats() {
  document.getElementById('statAttempts').textContent = statAttempts;
  document.getElementById('statHits').textContent     = statHits;
  const pct = statAttempts > 0 ? Math.round(statHits / statAttempts * 100) : '--';
  document.getElementById('statPct').textContent      = pct !== '--' ? pct + '%' : '--%';
  const avg = centsSamples.length > 0
    ? (centsSamples.reduce((a,b)=>a+b,0) / centsSamples.length).toFixed(1)
    : '--';
  document.getElementById('statAvgCents').textContent = avg;
}

// ============================================================
// TIMER LOGIC
// ============================================================
function resetTimer() {
  inGreenZone   = false;
  greenStart    = 0;
  currentHoldMs = 0;
  bendDetected  = false;
  document.getElementById('timerFill').style.width = '0%';
  document.getElementById('timerCount').textContent = '0 / 0';
}

function triggerSuccess() {
  statHits++;
  updateStats();
  // Flash the screen green
  const flash = document.getElementById('flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 300);
  // Reset for next bend
  setTimeout(resetTimer, 600);
}

function updateTimer(isGreen, cents) {
  const now = performance.now();

  if (isGreen) {
    // Count this as a bend attempt the first time we hit green after a non-green period
    if (!inGreenZone) {
      inGreenZone = true;
      greenStart  = now;
      if (!bendDetected) {
        statAttempts++;
        bendDetected = true;
        updateStats();
      }
    }
    currentHoldMs = now - greenStart;
    if (cents !== null) centsSamples.push(Math.abs(cents));
    if (currentHoldMs >= GOAL_MS) {
      triggerSuccess();
      return;
    }
  } else {
    if (inGreenZone) {
      // Left the zone — decay the timer quickly
      currentHoldMs = Math.max(0, currentHoldMs - (now - greenStart) * 2);
    }
    inGreenZone = false;
  }

  const pct = Math.min(100, (currentHoldMs / GOAL_MS) * 100);
  document.getElementById('timerFill').style.width = pct + '%';
  document.getElementById('timerCount').textContent =
    (currentHoldMs / 1000).toFixed(1) + ' / 1.0 s';
}

// ============================================================
// CANVAS GRAPH
// ============================================================
const canvas = document.getElementById('graph');
const ctx2d  = canvas.getContext('2d');
let gWidth   = 0;

function resizeCanvas() {
  gWidth = canvas.offsetWidth;
  canvas.width  = gWidth * devicePixelRatio;
  canvas.height = 140 * devicePixelRatio;
  ctx2d.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawGraph() {
  const w = gWidth, h = 140;
  ctx2d.clearRect(0, 0, w, h);
  const ppc = (h / 2) / 50; // pixels per cent

  // Zone background
  ctx2d.fillStyle = 'rgba(76,175,80,0.07)';
  ctx2d.fillRect(0, h/2 - CENTS_GREEN*ppc, w, CENTS_GREEN*ppc*2);

  // Centre line
  ctx2d.strokeStyle = '#2a2724';
  ctx2d.lineWidth = 1;
  ctx2d.beginPath();
  ctx2d.moveTo(0, h/2); ctx2d.lineTo(w, h/2);
  ctx2d.stroke();

  if (graphData.length < 2) return;

  ctx2d.beginPath();
  let started = false;
  graphData.forEach((d, i) => {
    if (d === null) { started = false; return; }
    const x = (i / (GRAPH_MAX - 1)) * w;
    const y = h/2 - Math.max(-50, Math.min(50, d)) * ppc;
    if (!started) { ctx2d.moveTo(x, y); started = true; }
    else ctx2d.lineTo(x, y);
  });
  ctx2d.strokeStyle = '#C9762C';
  ctx2d.lineWidth = 3;
  ctx2d.stroke();

  // Colour the last point
  if (graphData.length > 1) {
    const last = graphData[graphData.length - 1];
    const prev = graphData[graphData.length - 2];
    if (last !== null && prev !== null) {
      const col = Math.abs(last) <= CENTS_GREEN ? '#4CAF50'
                : Math.abs(last) <= CENTS_CLOSE ? '#F0C040' : '#E24B4A';
      const x0 = ((graphData.length - 2) / (GRAPH_MAX - 1)) * w;
      const x1 = ((graphData.length - 1) / (GRAPH_MAX - 1)) * w;
      ctx2d.beginPath();
      ctx2d.moveTo(x0, h/2 - Math.max(-50,Math.min(50,prev))*ppc);
      ctx2d.lineTo(x1, h/2 - Math.max(-50,Math.min(50,last))*ppc);
      ctx2d.strokeStyle = col;
      ctx2d.lineWidth = 4;
      ctx2d.stroke();
    }
  }
}

// ============================================================
// MAIN UI UPDATE
// ============================================================
function updateUI(freq, clarity, rawFreq, rawClarity) {
  const cents = freqToCents(freq, targetFreq);
  const color = clarity >= CLARITY_THRESH ? centsColor(cents) : 'silent';
  const hasSignal = clarity >= CLARITY_THRESH && freq > 0;

  // Pitch readout
  const noteName = hasSignal ? midiToNoteName(freqToMidi(freq)) : '--';
  const pitchEl  = document.getElementById('pitchBig');
  pitchEl.textContent = noteName;
  pitchEl.className   = 'pitch-big ' + (hasSignal ? color : '');

  document.getElementById('pitchHz').textContent = hasSignal
    ? `${freq.toFixed(1)} Hz · claridad: ${(rawClarity*100).toFixed(0)}%`
    : '--- Hz · claridad: ---%';

  // Cents bar
  const centsEl   = document.getElementById('centsLabel');
  const needleEl  = document.getElementById('barNeedle');
  const zoneLbl   = document.getElementById('zoneLabel');

  if (hasSignal && cents !== null) {
    const centsRound = cents.toFixed(1);
    centsEl.textContent  = (cents > 0 ? '+' : '') + centsRound + ' ¢';
    centsEl.className    = 'cents-val-label ' + color;
    const pct = 50 + Math.max(-50, Math.min(50, cents));
    needleEl.style.left  = pct + '%';
    needleEl.className   = 'bar-needle ' + color;

    const zoneText = { green: '✓ AFINADO', yellow: '~ CERCA', red: '✗ DESAFINADO' };
    zoneLbl.textContent = zoneText[color] || '—';
    zoneLbl.className   = 'zone-label ' + color;

    // Timer
    updateTimer(color === 'green', cents);

    // Graph
    graphData.push(cents);
  } else {
    centsEl.textContent = '-- ¢';
    centsEl.className   = 'cents-val-label';
    needleEl.style.left = '50%';
    needleEl.className  = 'bar-needle';
    zoneLbl.textContent = hasSignal ? '—' : '— sin señal —';
    zoneLbl.className   = 'zone-label silent';
    graphData.push(null);
    if (!hasSignal && inGreenZone) {
      inGreenZone = false;
    }
  }

  if (graphData.length > GRAPH_MAX) graphData.shift();
  drawGraph();

  // WakeLock status
  const wlEl = document.getElementById('wlStatus');
  if (!('wakeLock' in navigator)) {
    wlEl.innerHTML = '<span class="wl-bad">Pantalla: sin soporte</span>';
  } else if (wakeLock && !wakeLock.released) {
    wlEl.innerHTML = '<span class="wl-ok">● Pantalla activa</span>';
  } else {
    wlEl.innerHTML = '<span class="wl-bad">○ Pantalla puede apagarse</span>';
  }

  document.getElementById('statusLeft').textContent = audioCtx
    ? `${audioCtx.sampleRate} Hz · ${rawFreq > 0 ? rawFreq.toFixed(0)+' Hz raw' : 'sin señal'}`
    : '—';
}

// ============================================================
// AUDIO PIPELINE
// ============================================================
function processAudio() {
  if (!audioCtx) return;

  const buffer = new Float32Array(BUFFER_SIZE);
  analyser.getFloatTimeDomainData(buffer);

  let rms = 0;
  for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
  rms = Math.sqrt(rms / buffer.length);

  if (rms < 0.01) {
    smoothBuf = [];
    updateUI(0, 0, 0, 0);
    rafId = requestAnimationFrame(processAudio);
    return;
  }

  const { freq, clarity } = findPitch(buffer, audioCtx.sampleRate);
  const now = performance.now();
  let displayFreq = freq, displayClarity = clarity;

  if (clarity >= CLARITY_THRESH && freq > 50 && freq < 2000) {
    lastValidFreq    = freq;
    lastValidClarity = clarity;
    lastValidTime    = now;
    smoothBuf.push(freq);
    if (smoothBuf.length > SMOOTH_FRAMES) smoothBuf.shift();
  } else if (now - lastValidTime < HOLD_MS && lastValidFreq > 0) {
    displayFreq    = lastValidFreq;
    displayClarity = lastValidClarity * 0.75;
    smoothBuf = [];
  } else {
    smoothBuf = [];
  }

  const smoothFreq = smoothBuf.length > 0
    ? smoothBuf.reduce((a,b) => a+b, 0) / smoothBuf.length
    : displayFreq;

  updateUI(smoothFreq, displayClarity, freq, clarity);
  rafId = requestAnimationFrame(processAudio);
}

// ============================================================
// WAKELOCK
// ============================================================
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => {});
  } catch(e) {}
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && audioCtx) await acquireWakeLock();
});

// ============================================================
// MIC START / STOP
// ============================================================
async function startMic() {
  const btn = document.getElementById('btnMic');
  btn.disabled = true;
  btn.innerHTML = '<span class="mic-dot"></span> Conectando...';

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl:  false,
        sampleRate: audioCtx.sampleRate
      }
    });
    audioCtx._stream = stream;

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = BUFFER_SIZE * 2;
    analyser.smoothingTimeConstant = 0;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    await acquireWakeLock();

    btn.disabled = false;
    btn.className = 'btn-mic active';
    btn.innerHTML = '<span class="mic-dot"></span> Detener micrófono';

    smoothBuf = [];
    lastValidFreq = lastValidClarity = lastValidTime = 0;
    resetTimer();
    processAudio();
    return true;

  } catch(err) {
    audioCtx = null;
    btn.disabled = false;
    btn.className = 'btn-mic';
    btn.innerHTML = '<span class="mic-dot"></span> Reintentar';
    document.getElementById('statusLeft').textContent =
      err.name + ': ' + err.message;
    return false;
  }
}

function stopMic() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (audioCtx?._stream) audioCtx._stream.getTracks().forEach(t => t.stop());
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
  smoothBuf = [];
  resetTimer();

  const btn = document.getElementById('btnMic');
  btn.className = 'btn-mic';
  btn.innerHTML = '<span class="mic-dot"></span> Iniciar micrófono';
  document.getElementById('statusLeft').textContent = 'Micrófono detenido';
  document.getElementById('wlStatus').textContent   = '—';
}

// ============================================================
// EVENT LISTENERS
// ============================================================
let micActive2 = false;
document.getElementById('btnMic').addEventListener('click', async () => {
  if (micActive2) {
    micActive2 = false;
    stopMic();
  } else {
    const ok = await startMic();
    if (ok) micActive2 = true;
  }
});

document.getElementById('fretDown').addEventListener('click', () => {
  if (selectedFret > 0) { selectedFret--; updateConfig(); }
});
document.getElementById('fretUp').addEventListener('click', () => {
  if (selectedFret < 24) { selectedFret++; updateConfig(); }
});

document.querySelectorAll('.bend-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedSemi = parseInt(btn.dataset.semi);
    document.querySelectorAll('.bend-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateConfig();
  });
});

document.getElementById('btnReset').addEventListener('click', () => {
  statAttempts = statHits = 0;
  centsSamples = [];
  resetTimer();
  updateStats();
});

// ============================================================
// INIT
// ============================================================
buildStringGrid();
updateConfig();
updateStats();
resizeCanvas();
drawGraph();
</script>
</body>
</html>
